title = "Auraxis Web — Gitleaks configuration"

[extend]
useDefault = true

[[allowlists]]
description = "Test fixtures — mock credentials are intentional and not real secrets"
paths = [
  '''.*\.spec\.ts''',
  '''.*\.spec\.tsx''',
  '''.*\.test\.ts''',
  '''.*test\.ts''',
  '''.*mock.*\.ts''',
  '''__tests__/.*''',
]

[[allowlists]]
description = "Test fixture values — known mock credential patterns"
regexTarget = "match"
regexes = [
  '''Test@\d+''',
  '''test_secret''',
  '''mock_token''',
  '''fake_token''',
  '''test_password''',
  '''TestPass\w*''',
  '''Password@\w*''',
  '''Senha@\w*''',
  '''validPassword\w*''',
  '''StrongPass\w*''',
]
