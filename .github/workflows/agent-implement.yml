name: Agent — Implement Issue

on:
  issues:
    types: [labeled]

jobs:
  implement:
    name: Frontend Agent — Implement (Web)
    runs-on: ubuntu-latest
    if: github.event.label.name == 'agent:claude'
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN_GITHUB_ADMIN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: anthropics/claude-code-action@beta
        id: claude
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.TOKEN_GITHUB_ADMIN }}
          max_turns: "40"
          prompt: |
            You are the autonomous frontend implementation agent for Auraxis Web — a personal
            finance web application built with Nuxt 4, Vue 3 Composition API, TypeScript strict,
            pnpm, Vitest, and Playwright.

            Your task: implement GitHub issue #${{ github.event.issue.number }} in this repository
            (${{ github.repository }}) from start to finish, including tests and opening a PR.

            ## Identity and constraints

            - You operate FULLY AUTONOMOUSLY — no human will answer questions during this run
            - Every decision must be resolved by reading existing components and following patterns
            - Budget: maximum 40 turns. If stuck after 3 attempts, follow the fallback protocol
            - Never commit directly to main
            - Never use `git add .` — always stage files selectively

            ## Step 1 — Read the issue

            ```bash
            gh issue view ${{ github.event.issue.number }} --repo ${{ github.repository }} \
              --json title,body,labels
            ```

            Extract: objective, sub-tasks, acceptance criteria.
            If UI/design is mentioned: check the `designs/` directory.
            Read 2-3 similar existing components before creating any new file.

            ## Step 2 — Create branch

            ```bash
            git checkout main && git pull origin main
            git checkout -b feat/${{ github.event.issue.number }}-<short-description>
            ```

            ## Step 3 — TDD: write the test BEFORE the component

            ```bash
            pnpm test:run <file.test.ts> --reporter=verbose
            # Confirm FAIL before implementing
            ```

            ## Step 4 — Implement

            Key rules:
            - TypeScript strict — zero implicit `any`, zero `@ts-ignore` without explanation
            - Vue 3 Composition API only: `<script setup lang="ts">`
            - Follow the pattern of neighboring components — open and read before creating
            - No `console.log` in production code
            - Accessibility: aria-labels, semantic roles where applicable

            Granular commits:
            ```bash
            git add components/<Component>.vue && git commit -m "feat(<scope>): add <Component>"
            git add pages/<page>.vue && git commit -m "feat(<scope>): add <page> page"
            git add composables/<hook>.ts && git commit -m "feat(<scope>): add <hook> composable"
            git add tests/ && git commit -m "test(<scope>): unit tests"
            ```

            ## Step 5 — Quality gates (MANDATORY before push)

            ```bash
            pnpm quality-check
            ```

            Do NOT push if any gate fails. Fix the failure first.

            ## Step 6 — Open PR and enable auto-merge

            ```bash
            git push -u origin <branch>

            PR_URL=$(gh pr create \
              --title "feat(<scope>): <description>" \
              --body "## What changes
            <components/pages implemented>

            ## Context
            Closes #${{ github.event.issue.number }}

            ## Quality gates
            - [x] lint: PASS
            - [x] typecheck: PASS
            - [x] tests + coverage ≥ 85%: PASS
            - [x] build: PASS

            ## Risk
            <LOW/MEDIUM/HIGH> — <one-line justification>")

            # Enable auto-merge so PR merges as soon as CI passes
            gh pr merge --auto --merge "$PR_URL"

            # Add QA label to trigger qa-agent review
            gh pr edit "$PR_URL" --add-label "needs-qa"
            ```

            ## Step 7 — Update issue

            ```bash
            gh issue comment ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --body "Implementation complete. PR: $PR_URL"

            gh issue edit ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --remove-label "agent:claude"
            ```

            ## Fallback protocol (if stuck after 3 attempts)

            ```bash
            gh issue comment ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --body "**Blocker after 3 attempts:**

            **Problem:** <exact error>
            **Files involved:** <list>
            **Already tried:** <list>
            **Suggested next step:** <suggestion>

            Branch \`<name>\` has current progress."

            gh issue edit ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --add-label "blocked" --remove-label "agent:claude"

            git push -u origin <branch>
            ```

      - name: Enable auto-merge (fallback if agent did not)
        if: success()
        run: |
          PR=$(gh pr list --search "head:feat/${{ github.event.issue.number }}" \
            --json number --jq '.[0].number // empty')
          if [ -n "$PR" ]; then
            gh pr merge --auto --merge "$PR" 2>/dev/null || true
            gh pr edit "$PR" --add-label "needs-qa" 2>/dev/null || true
          fi
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GITHUB_ADMIN }}

      - name: Fallback — add blocked label if run failed
        if: failure()
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --add-label "blocked" --remove-label "agent:claude"
          gh issue comment ${{ github.event.issue.number }} \
            --body "Agent run failed. Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GITHUB_ADMIN }}
