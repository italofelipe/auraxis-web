name: PWA Store Artifacts (Manual)

on:
  workflow_dispatch:

env:
  NODE_VERSION: "25"
  PNPM_VERSION: "10.30.1"

jobs:
  build-artifacts:
    name: Build PWA Packaging Artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate static output
        run: pnpm generate

      - name: Package artifacts
        run: |
          mkdir -p store-artifacts
          tar -czf store-artifacts/pwa-static-output.tar.gz -C .output/public .
          cp public/manifest.webmanifest store-artifacts/manifest.webmanifest

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pwa-store-artifacts
          path: store-artifacts/
          retention-days: 14
