name: Deploy Official Web (AWS)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: prod
        type: choice
        options:
          - dev
          - pilot
          - prod
      api_base_url:
        description: Public API base URL
        required: true
        default: https://api.auraxis.com.br
        type: string
      run_smoke_test:
        description: Run smoke test against official hostname after deploy
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: web-official-prod
  cancel-in-progress: false

env:
  NODE_VERSION: "25"
  PNPM_VERSION: "10.30.1"
  AWS_REGION: "us-east-1"
  S3_BUCKET: "app.auraxis.com.br"
  WEB_OFFICIAL_HOSTNAME: ${{ vars.WEB_OFFICIAL_HOSTNAME || 'app.auraxis.com.br' }}

jobs:
  # ── 1. Generate static output ────────────────────────────────────────────────
  build:
    name: Generate static site
    runs-on: ubuntu-latest
    steps:
      - name: Set deployment parameters
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "DEPLOY_ENVIRONMENT=prod"                       >> $GITHUB_ENV
            echo "DEPLOY_API_BASE_URL=https://api.auraxis.com.br" >> $GITHUB_ENV
            echo "DEPLOY_RUN_SMOKE_TEST=true"                   >> $GITHUB_ENV
            echo "Automatic deployment triggered by push to main"
          else
            echo "DEPLOY_ENVIRONMENT=${{ inputs.environment }}"   >> $GITHUB_ENV
            echo "DEPLOY_API_BASE_URL=${{ inputs.api_base_url }}" >> $GITHUB_ENV
            echo "DEPLOY_RUN_SMOKE_TEST=${{ inputs.run_smoke_test }}" >> $GITHUB_ENV
            echo "Manual deployment triggered by workflow_dispatch"
          fi

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate static site
        env:
          NODE_ENV: production
          NUXT_PUBLIC_API_BASE: ${{ env.DEPLOY_API_BASE_URL }}
          NUXT_PUBLIC_SENTRY_DSN: ${{ secrets.NUXT_PUBLIC_SENTRY_DSN }}
          NUXT_PUBLIC_APP_ENV: ${{ env.DEPLOY_ENVIRONMENT }}
          NUXT_PUBLIC_SITE_URL: https://${{ env.WEB_OFFICIAL_HOSTNAME }}
          # Baked into every HTML page as <meta name="x-build-id">.
          # The smoke test reads this tag to confirm CloudFront is serving
          # the current build and not a stale cached snapshot.
          NUXT_PUBLIC_BUILD_ID: "${{ github.run_id }}-${{ github.sha }}"
        run: pnpm generate

      - name: Validate output
        run: |
          test -d .output/public || (echo "ERROR: .output/public not found"; exit 1)
          test -f .output/public/index.html || (echo "ERROR: index.html not found"; exit 1)
          echo "✓ Static output validated"
          echo "  Files: $(find .output/public -type f | wc -l)"
          echo "  Size:  $(du -sh .output/public | cut -f1)"

      - name: Package static output
        # .output is in .gitignore — package as tarball so upload-artifact
        # does not skip it via gitignore-aware globbing.
        run: tar -czf static-build.tar.gz .output/public

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-official-static-${{ env.DEPLOY_ENVIRONMENT }}
          path: static-build.tar.gz
          retention-days: 7
          if-no-files-found: error

  # ── 2. Deploy to S3 + invalidate CloudFront ───────────────────────────────────
  deploy:
    name: Deploy to S3 + CloudFront
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: web-official-prod
      url: https://${{ env.WEB_OFFICIAL_HOSTNAME }}
    steps:
      - name: Set deployment parameters
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "DEPLOY_ENVIRONMENT=prod"     >> $GITHUB_ENV
            echo "DEPLOY_RUN_SMOKE_TEST=true"  >> $GITHUB_ENV
          else
            echo "DEPLOY_ENVIRONMENT=${{ inputs.environment }}"       >> $GITHUB_ENV
            echo "DEPLOY_RUN_SMOKE_TEST=${{ inputs.run_smoke_test }}" >> $GITHUB_ENV
          fi

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: web-official-static-${{ env.DEPLOY_ENVIRONMENT }}
          path: .

      - name: Extract static output
        run: tar -xzf static-build.tar.gz

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_WEB_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Guard: verify the S3 bucket declared in this workflow matches the
      # actual origin of the CloudFront distribution before uploading anything.
      # A mismatch (e.g. S3_BUCKET points to the wrong bucket) would silently
      # deploy to a bucket CloudFront never reads — root cause of the 26/03
      # incident where production served a 3-day-old snapshot indefinitely.
      #
      # We check that CF_ORIGIN *starts with* S3_BUCKET (prefix match) rather
      # than an exact string comparison. This tolerates the two endpoint formats
      # AWS uses depending on how the distribution was configured:
      #   • REST endpoint  : bucket.s3.amazonaws.com
      #   • Website endpoint: bucket.s3-website-us-east-1.amazonaws.com
      # Both start with the bucket name followed by a dot, so the prefix check
      # catches true bucket drift (wrong bucket) while ignoring endpoint format.
      - name: Verify S3 bucket matches CloudFront origin
        run: |
          DIST_ID="${{ vars.AWS_WEB_CLOUDFRONT_DISTRIBUTION_ID }}"
          CF_ORIGIN=$(aws cloudfront get-distribution \
            --id "$DIST_ID" \
            --query 'Distribution.DistributionConfig.Origins.Items[0].DomainName' \
            --output text)
          BUCKET="${{ env.S3_BUCKET }}"
          echo "CloudFront origin : $CF_ORIGIN"
          echo "S3_BUCKET         : $BUCKET"
          if [[ "$CF_ORIGIN" != "${BUCKET}."* ]]; then
            echo "✗ MISMATCH — deploy abortado para evitar entrega no bucket errado"
            echo "  CF origin '${CF_ORIGIN}' não começa com '${BUCKET}.'"
            echo "  Verifique S3_BUCKET no workflow e o origin da distribuição $DIST_ID"
            exit 1
          fi
          echo "✓ CloudFront origin bate com S3_BUCKET (formato: ${CF_ORIGIN})"

      # Upload to S3.
      # Cache strategy:
      #   - HTML files: cp --recursive (unconditional upload — aws s3 sync skips
      #     files whose S3 ETag matches the local MD5, which silently keeps stale
      #     HTML in production when the build content hasn't changed enough to
      #     differ at the byte level; cp always overwrites regardless of ETag)
      #   - Assets (hashed filenames): 1-year immutable cache; sync --delete
      #     removes obsolete hashed chunks from S3
      - name: Upload HTML files (no-cache, force)
        run: |
          aws s3 cp .output/public/ "s3://${{ env.S3_BUCKET }}/" \
            --region "${{ env.AWS_REGION }}" \
            --recursive \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Upload hashed assets (immutable cache)
        run: |
          aws s3 sync .output/public/ "s3://${{ env.S3_BUCKET }}/" \
            --region "${{ env.AWS_REGION }}" \
            --exclude "*.html" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID="${{ vars.AWS_WEB_CLOUDFRONT_DISTRIBUTION_ID }}"
          echo "Invalidating CloudFront distribution: $DIST_ID"
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "Invalidation created: $INVALIDATION_ID"
          echo "INVALIDATION_ID=$INVALIDATION_ID" >> $GITHUB_ENV

      - name: Wait for invalidation to complete
        run: |
          echo "Waiting for CloudFront invalidation ${{ env.INVALIDATION_ID }}..."
          aws cloudfront wait invalidation-completed \
            --distribution-id "${{ vars.AWS_WEB_CLOUDFRONT_DISTRIBUTION_ID }}" \
            --id "${{ env.INVALIDATION_ID }}"
          echo "✓ CloudFront cache invalidated"

      # ── Smoke test ──────────────────────────────────────────────────────────
      # Two-phase check:
      #   1. HTTP 200 — the page is reachable
      #   2. buildId match — CloudFront is serving THIS deploy, not a stale snapshot
      #
      # Phase 2 catches the class of incident that occurred on 26/03/2026,
      # where S3 had new HTML but CloudFront kept serving 3-day-old content
      # and the HTTP-200-only smoke test detected nothing.
      - name: Smoke test
        if: ${{ env.DEPLOY_RUN_SMOKE_TEST == 'true' }}
        run: |
          EXPECTED_BUILD_ID="${{ github.run_id }}-${{ github.sha }}"
          echo "Smoke test → https://${WEB_OFFICIAL_HOSTNAME}/login"
          echo "Expected buildId: $EXPECTED_BUILD_ID"

          # Phase 1 — HTTP 200
          HTTP_CODE=""
          for i in $(seq 1 10); do
            HTTP_CODE=$(curl --silent --output /tmp/smoke.html \
              --write-out "%{http_code}" \
              --location \
              "https://${WEB_OFFICIAL_HOSTNAME}/login")
            if [ "$HTTP_CODE" = "200" ] && [ -s /tmp/smoke.html ]; then
              echo "✓ Phase 1 — HTTP $HTTP_CODE ($(wc -c < /tmp/smoke.html) bytes)"
              break
            fi
            echo "  Attempt $i/10 — HTTP $HTTP_CODE — retrying in 3s..."
            sleep 3
          done
          if [ "$HTTP_CODE" != "200" ]; then
            echo "✗ Phase 1 failed — page not reachable after 10 attempts"
            exit 1
          fi

          # Phase 2 — buildId freshness
          # Extract only the content of <meta name="x-build-id" content="...">
          # The HTML from CloudFront/Nuxt is minified (all meta tags on one line),
          # so a plain `grep 'x-build-id' | grep -o 'content="..."'` would match
          # the content attributes of ALL meta tags on that line. We anchor the
          # pattern to `name="x-build-id" content="..."` to extract only the right value.
          for i in $(seq 1 15); do
            SERVED_BUILD_ID=$(curl --silent \
              "https://${WEB_OFFICIAL_HOSTNAME}/login" \
              | grep -o 'name="x-build-id" content="[^"]*"' \
              | cut -d'"' -f4)
            if [ "$SERVED_BUILD_ID" = "$EXPECTED_BUILD_ID" ]; then
              echo "✓ Phase 2 — buildId verified: $SERVED_BUILD_ID"
              exit 0
            fi
            echo "  Attempt $i/15 — served=$SERVED_BUILD_ID expected=$EXPECTED_BUILD_ID — retrying in 5s..."
            sleep 5
          done
          echo "✗ Phase 2 failed — CloudFront still serving stale build after 75s"
          echo "  served:   $SERVED_BUILD_ID"
          echo "  expected: $EXPECTED_BUILD_ID"
          exit 1
