# Dependency Review — auraxis-web
# Bloqueia PRs que introduzem dependências com vulnerabilidades conhecidas (CVEs).
# Usa o banco de dados do GitHub Advisory Database — gratuito e sem configuração extra.
# Executa apenas em pull_request (não em push direto a master).

name: Dependency Review

on:
  pull_request:
    branches: [master, main]

jobs:
  dependency-review:
    name: Dependency Review (CVE check)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Falha se qualquer CVE de severidade >= high for introduzido
          fail-on-severity: high
          # Comenta no PR com o resumo de vulnerabilidades
          comment-summary-in-pr: always
          # Bloqueia licenças restritivas em produção
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0
          # node-forge has a dual SPDX expression: (BSD-3-Clause OR GPL-2.0).
          # The package was already present at 1.3.3 (same license) and is being
          # upgraded to 1.4.0 for security reasons (4 high CVEs patched).
          # We use the BSD-3-Clause interpretation — GPL-2.0 is only an alternative
          # offered by upstream; we do not distribute a GPL-2.0 derivative.
          allow-dependencies-licenses: pkg:npm/node-forge
