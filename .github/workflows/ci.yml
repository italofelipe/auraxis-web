# CI Pipeline — auraxis-web
# Stack: Nuxt 4 · pnpm · @nuxt/eslint · TypeScript strict · Vitest · Playwright
# Executa em todo PR e push para master.
#
# Secrets necessários (Settings → Secrets and variables → Actions):
#   SONAR_AURAXIS_WEB_TOKEN — SonarCloud (sonarcloud.io → My Account → Security)
#   LHCI_GITHUB_APP_TOKEN  — Lighthouse CI GitHub App (opcional — status checks no PR)

name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.30.1'

jobs:
  # ── 1. Lint (@nuxt/eslint) ─────────────────────────────────────────────
  lint:
    name: Lint (@nuxt/eslint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  # ── 2. Type-check ──────────────────────────────────────────────────────
  typecheck:
    name: TypeScript (strict)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  # ── 3. Testes com coverage (Vitest) ────────────────────────────────────
  test:
    name: Tests + Coverage (Vitest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run tests with coverage
        run: pnpm test:coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ── 4. Build check ─────────────────────────────────────────────────────
  build:
    name: Build (Nuxt)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build Nuxt app
        run: pnpm build
        env:
          NODE_ENV: production
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuxt-build
          path: .output/
          retention-days: 1

  # ── 4.1 Docker Build Check ─────────────────────────────────────────────
  docker-build:
    name: Docker Build (Nuxt)
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Build production runtime image
        run: docker build --target runner --tag auraxis-web:runner .
      - name: Build development image
        run: docker build --target dev --tag auraxis-web:dev .

  # ── 5. Bundle Size Analysis ────────────────────────────────────────────
  bundle-analysis:
    name: Bundle Size Analysis
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build for analysis
        run: pnpm build
        env:
          NODE_ENV: production
      - name: Report bundle sizes
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            function getDirSize(dirPath) {
              if (!fs.existsSync(dirPath)) return 0;
              let total = 0;
              const entries = fs.readdirSync(dirPath, { withFileTypes: true });
              for (const entry of entries) {
                const full = path.join(dirPath, entry.name);
                if (entry.isDirectory()) total += getDirSize(full);
                else total += fs.statSync(full).size;
              }
              return total;
            }

            const fmt = (b) => b === 0 ? 'N/A' : (b / 1024).toFixed(1) + ' KB';
            const pub = getDirSize('.output/public');
            const srv = getDirSize('.output/server');

            const body = [
              '## 📦 Bundle Size Report',
              '',
              '| Asset | Size |',
              '|:------|-----:|',
              `| Public (client JS/CSS) | ${fmt(pub)} |`,
              `| Server bundle | ${fmt(srv)} |`,
              `| **Total** | **${fmt(pub + srv)}** |`,
              '',
              '> Thresholds: public ≤ 1.5 MB (aviso) · ≤ 3 MB (hard limit)',
            ].join('\n');

            try {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } catch (error) {
              core.warning(`Could not post bundle report comment: ${error.message}`);
            }

            if (pub > 3 * 1024 * 1024) {
              core.setFailed(`Public bundle too large: ${fmt(pub)} (limit: 3 MB)`);
            }

  # ── 6. Secret Scan (Gitleaks) ──────────────────────────────────────────
  secret-scan-gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 7. Secret Scan (TruffleHog) ────────────────────────────────────────
  # TruffleHog complementa Gitleaks: analisa entropia + valida secrets ativos
  secret-scan-trufflehog:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # ── 8. Dependency Audit ────────────────────────────────────────────────
  audit:
    name: Dependency Audit (pnpm)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit deps (high/critical) with temporary minimatch allowlist
        run: |
          pnpm audit --json > audit.json || true
          node - <<'NODE'
          const fs = require('fs');
          const audit = JSON.parse(fs.readFileSync('audit.json', 'utf8'));
          const allowedIds = new Set(['GHSA-3ppc-4f35-3m26', '1113371']);
          const advisories = audit.advisories || {};
          const findings = [];

          for (const [id, advisory] of Object.entries(advisories)) {
            const severity = advisory.severity || 'unknown';
            if (severity !== 'high' && severity !== 'critical') continue;

            const ghsa = advisory.github_advisory_id || '';
            const source = String(advisory.id || id);
            const isAllowed = allowedIds.has(ghsa) || allowedIds.has(source);

            if (!isAllowed) {
              findings.push({
                severity,
                module: advisory.module_name || 'unknown',
                id: ghsa || source || advisory.title || 'unknown',
              });
            }
          }

          if (findings.length > 0) {
            console.error('Disallowed high/critical vulnerabilities found:');
            for (const f of findings) {
              console.error(`- [${f.severity}] ${f.module}: ${f.id}`);
            }
            process.exit(1);
          }

          console.log('Audit gate passed (only allowlisted minimatch advisory detected).');
          NODE

  # ── 9. SonarCloud ──────────────────────────────────────────────────────
  # Requer SONAR_AURAXIS_WEB_TOKEN configurado nos secrets do repositório.
  # sonar-project.properties deve existir na raiz.
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate coverage for Sonar
        run: pnpm test:coverage
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_AURAXIS_WEB_TOKEN }}

  # ── 10. Lighthouse CI ──────────────────────────────────────────────────
  # Mede performance, acessibilidade, SEO e boas práticas.
  # Requer .lighthouserc.yml na raiz.
  # LHCI_GITHUB_APP_TOKEN é opcional — sem ele usa temporaryPublicStorage.
  # Temporariamente protegido por flag de repo variable:
  #   ENABLE_LIGHTHOUSE_CI=true
  lighthouse:
    name: Lighthouse CI (Perf · A11y · SEO)
    runs-on: ubuntu-latest
    needs: [build]
    if: vars.ENABLE_LIGHTHOUSE_CI == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build for Lighthouse
        run: pnpm build
        env:
          NODE_ENV: production
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .lighthouserc.yml
          uploadArtifacts: true
          temporaryPublicStorage: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # ── 11. E2E Tests (Playwright) ─────────────────────────────────────────
  # Temporariamente protegido por flag de repo variable:
  #   ENABLE_WEB_E2E=true
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build]
    if: vars.ENABLE_WEB_E2E == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Build app
        run: pnpm build
        env:
          NODE_ENV: production
      - name: Run Playwright tests
        run: pnpm test:e2e
        env:
          CI: true
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ── 12. Commit lint ────────────────────────────────────────────────────
  commitlint:
    name: Conventional Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm dlx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  # ── Status gate ────────────────────────────────────────────────────────
  # Branch protection: adicionar "ci-passed" como required status check.
  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      - lint
      - typecheck
      - test
      - build
      - docker-build
      - secret-scan-gitleaks
      - secret-scan-trufflehog
      - audit
      - sonarcloud
      - lighthouse
      - e2e
    if: always()
    steps:
      - name: Check all required jobs
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          if echo "$results" | grep -qw "failure"; then
            echo "❌ One or more required CI jobs failed."
            exit 1
          fi
          echo "✅ All CI jobs passed."
