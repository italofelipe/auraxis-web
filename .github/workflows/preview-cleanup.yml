name: Preview Cleanup (per-PR)

# Removes the static preview published by preview-deploy.yml once the PR is
# closed (merged or abandoned). Leaving preview prefixes behind would grow
# S3 storage unboundedly and leak old UI through stable URLs.

on:
  pull_request:
    types: [closed]
    branches: [main, master]

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  AWS_REGION: "us-east-1"
  S3_BUCKET: "app.auraxis.com.br"

jobs:
  cleanup:
    name: Delete preview prefix
    runs-on: ubuntu-latest
    steps:
      - name: Check cleanup capability
        id: capability
        env:
          ROLE_VALUE: ${{ secrets.AWS_WEB_DEPLOY_ROLE_ARN }}
        run: |
          if [ -n "${ROLE_VALUE:-}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Preview cleanup skipped: AWS_WEB_DEPLOY_ROLE_ARN not available."
          fi

      - name: Configure AWS credentials (OIDC)
        if: steps.capability.outputs.enabled == 'true'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_WEB_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Delete preview prefix
        if: steps.capability.outputs.enabled == 'true'
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PREFIX="_preview/pr-${PR_NUMBER}"
          echo "Removing s3://${S3_BUCKET}/${PREFIX}/"
          # `rm --recursive` is a no-op when the prefix has no objects.
          aws s3 rm "s3://${S3_BUCKET}/${PREFIX}/" --recursive --region "${AWS_REGION}"
          echo "✓ Preview prefix removed"

      - name: Close preview comment
        if: steps.capability.outputs.enabled == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const marker = '<!-- auraxis-preview-deploy -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c => (c.body || '').includes(marker));
            if (!existing) return;
            const closedLine = context.payload.pull_request.merged
              ? '> Preview removed (PR merged).'
              : '> Preview removed (PR closed without merge).';
            const newBody = existing.body.replace(
              /> Preview is served[\s\S]*$/,
              closedLine,
            );
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body: newBody,
            });
