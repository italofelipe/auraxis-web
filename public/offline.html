<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#44d4ff" />
    <title>Auraxis offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #06141f;
        color: #eef8ff;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 520px);
      }

      .mark {
        width: 64px;
        height: 64px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        margin-bottom: 24px;
        background: #0d2534;
        border: 1px solid rgba(68, 212, 255, 0.32);
        color: #44d4ff;
        font: 700 40px Georgia, serif;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 8vw, 3.4rem);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #b6c9d6;
        font-size: 1.05rem;
        line-height: 1.65;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">A</div>
      <h1>Voce esta offline</h1>
      <p>
        O Auraxis manteve o shell do app disponivel. Dados financeiros e acoes
        que dependem da API voltam assim que a conexao for restabelecida.
      </p>
    </main>
  </body>
</html>
