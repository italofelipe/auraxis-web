# Lighthouse CI — auraxis-web
# Documentation: https://github.com/GoogleChrome/lighthouse-ci
#
# Setup:
#   1. Install the Lighthouse CI GitHub App: https://github.com/apps/lighthouse-ci
#   2. Generate a LHCI_GITHUB_APP_TOKEN and add it to the repository secrets
#      (optional — without the token, uses temporaryPublicStorage)
#
# To run locally:
#   pnpm dlx @lhci/cli autorun
#
# Scope: runs against `pnpm preview` on localhost HTTP (no CDN, no HTTPS).
# Assertions are therefore scoped to what is measurable in that environment.
# Infrastructure-level checks (HTTPS, compression, caching, redirects, source
# maps, bf-cache) are intentionally omitted — they are enforced at the CDN and
# deploy-pipeline layer, not here.

ci:
  collect:
    # Use the Nuxt server in preview mode after build
    startServerCommand: NITRO_HOST=0.0.0.0 NITRO_PORT=3000 pnpm preview
    startServerReadyPattern: 'Listening on'
    startServerReadyTimeout: 120000
    url:
      - http://localhost:3000/
    numberOfRuns: 3  # Average over 3 runs to reduce variability

  assert:
    preset: lighthouse:no-pwa  # Does not require PWA (can be enabled later)
    assertions:
      # ── Scores measured reliably on localhost ──────────────────────────────
      # Accessibility: strictly enforced — a11y is a product requirement.
      'categories:accessibility':
        - error
        - minScore: 0.9           # ≥ 90 — fail

      # SEO: descriptive meta tags and crawlability — valid in any environment.
      'categories:seo':
        - warn
        - minScore: 0.85

      # ── Explicitly disabled: localhost-only artefacts ──────────────────────
      # The following assertions always fail or produce unreliable results when
      # running against a local HTTP preview server and are therefore disabled.
      # They are validated by other pipeline steps (CloudFront headers policy,
      # npm audit, deploy smoke-test).
      uses-https:                          { severity: off }
      no-vulnerable-libraries:             { severity: off }
      valid-source-maps:                   { severity: off }
      uses-text-compression:               { severity: off }
      uses-long-cache-ttl:                 { severity: off }
      redirects-http:                      { severity: off }
      bf-cache:                            { severity: off }
      unused-javascript:                   { severity: off }
      unused-css-rules:                    { severity: off }

      # Performance metrics: warn-only (non-blocking) to establish a Phase 0 baseline.
      # Thresholds are generous — goal is visibility, not enforcement yet.
      # Tighten after Phase 2 (PERF-GAP-01/02/06/07) improvements land.
      # Note: CI runners have no throttling consistency; treat absolute numbers
      # as relative indicators only. RUM in prod is the authoritative source.
      'categories:performance':
        - warn
        - minScore: 0.5

      largest-contentful-paint:
        - warn
        - maxNumericValue: 5000   # warn if LCP > 5s (CI runner, no CDN)

      total-blocking-time:
        - warn
        - maxNumericValue: 1500   # warn if TBT > 1.5s

      cumulative-layout-shift:
        - warn
        - maxNumericValue: 0.25   # warn if CLS > 0.25

      first-contentful-paint:              { severity: off }
      speed-index:                         { severity: off }
      'categories:best-practices':         { severity: off }

  upload:
    # Use temporary public storage (free, 13-day retention)
    # For persistence: configure a dedicated LHCI server or paid lhci.app
    target: temporary-public-storage
