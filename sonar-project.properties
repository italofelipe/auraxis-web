# SonarCloud — auraxis-web
# Documentação: https://docs.sonarcloud.io/advanced-setup/ci-based-analysis/github-actions-for-sonarcloud/

sonar.projectKey=italofelipe_auraxis-web
sonar.organization=sensoriumit

# Informações do projeto
sonar.projectName=auraxis-web
sonar.projectVersion=1.0

# Escopo baseline alinhado ao coverage real atual (WEB10/WEB2)
sonar.sources=app,composables
sonar.inclusions=app/app.vue,composables/useApi.ts
sonar.exclusions=**/.nuxt/**,**/.output/**,**/node_modules/**,**/dist/**,**/coverage/**,**/playwright-report/**,**/.storybook/**,**/*.spec.ts,**/*.spec.tsx,**/*.spec.vue,**/*.test.ts,**/*.test.tsx,**/*.test.vue

sonar.tests=.
sonar.test.inclusions=**/*.spec.ts,**/*.spec.tsx,**/*.spec.vue,**/*.test.ts,**/*.test.tsx,**/*.test.vue,**/e2e/**/*.ts

# Coverage — gerado por Vitest (pnpm test:coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.json
