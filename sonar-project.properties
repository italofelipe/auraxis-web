# SonarCloud — auraxis-web
# Documentação: https://docs.sonarcloud.io/advanced-setup/ci-based-analysis/github-actions-for-sonarcloud/
#
# Setup:
#   1. Acesse sonarcloud.io e crie um projeto para este repositório
#   2. Copie o Project Key gerado e substitua abaixo
#   3. Gere um token em My Account → Security e adicione como SONAR_TOKEN
#      nos secrets do repositório (Settings → Secrets and variables → Actions)

sonar.projectKey=italofelipe_auraxis-web
sonar.organization=italofelipe

# Informações do projeto
sonar.projectName=auraxis-web
sonar.projectVersion=1.0

# Caminhos a analisar (excluindo node_modules, .nuxt, dist, etc.)
sonar.sources=app,composables,components,pages,layouts,stores,server,plugins,middleware,utils
sonar.exclusions=\
  **/.nuxt/**,\
  **/.output/**,\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.spec.ts,\
  **/*.test.ts,\
  **/playwright-report/**,\
  **/.storybook/**

sonar.tests=.
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.spec.vue,**/e2e/**/*.ts

# Coverage — gerado por Vitest (pnpm test:coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.json
