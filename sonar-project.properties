# SonarCloud — auraxis-web
# Documentação: https://docs.sonarcloud.io/advanced-setup/ci-based-analysis/github-actions-for-sonarcloud/

sonar.projectKey=italofelipe_auraxis-web
sonar.organization=sensoriumit

# Informações do projeto
sonar.projectName=auraxis-web
sonar.projectVersion=1.0

# Escopo baseline alinhado ao coverage real atual (WEB10/WEB2)
sonar.sources=app
sonar.inclusions=app/**
sonar.exclusions=**/.nuxt/**,**/.output/**,**/node_modules/**,**/dist/**,**/coverage/**,**/playwright-report/**,**/.storybook/**,**/*.stories.ts,**/*.stories.tsx,**/*.stories.vue,**/*.spec.ts,**/*.spec.tsx,**/*.spec.vue,**/*.test.ts,**/*.test.tsx,**/*.test.vue

sonar.tests=.
sonar.test.inclusions=**/*.spec.ts,**/*.spec.tsx,**/*.spec.vue,**/*.test.ts,**/*.test.tsx,**/*.test.vue,**/e2e/**/*.ts

# Coverage — gerado por Vitest (pnpm test:coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Pages are covered by Playwright E2E tests, not Vitest unit tests.
# Excluding them from coverage analysis prevents false "new code coverage" failures
# when new pages are added (they won't appear in lcov.info at all).
sonar.coverage.exclusions=app/pages/**,e2e/**,app/utils/calculations/**,config/**,app/test-utils/**

# Pages are thin orchestration layers whose structural boilerplate (definePageMeta,
# useSeoMeta, etc.) is legitimately repeated across all tool pages.
# Excluding from CPD mirrors the coverage exclusion rationale above.
sonar.cpd.exclusions=app/pages/**

# Encoding
sonar.sourceEncoding=UTF-8

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.json
