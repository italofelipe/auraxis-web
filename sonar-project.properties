# SonarCloud — auraxis-web
# Documentação: https://docs.sonarcloud.io/advanced-setup/ci-based-analysis/github-actions-for-sonarcloud/

sonar.projectKey=italofelipe_auraxis-web
sonar.organization=sensoriumit

# Informações do projeto
sonar.projectName=auraxis-web
sonar.projectVersion=1.0

# Escopo baseline alinhado ao coverage real atual (WEB10/WEB2)
sonar.sources=app
sonar.inclusions=app/**
sonar.exclusions=**/.nuxt/**,**/.output/**,**/node_modules/**,**/dist/**,**/coverage/**,**/playwright-report/**,**/.storybook/**,**/*.stories.ts,**/*.stories.tsx,**/*.stories.vue,**/*.spec.ts,**/*.spec.tsx,**/*.spec.vue,**/*.test.ts,**/*.test.tsx,**/*.test.vue

sonar.tests=.
sonar.test.inclusions=**/*.spec.ts,**/*.spec.tsx,**/*.spec.vue,**/*.test.ts,**/*.test.tsx,**/*.test.vue,**/e2e/**/*.ts

# Coverage — gerado por Vitest (pnpm test:coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Pages are covered by Playwright E2E tests, not Vitest unit tests.
# Layouts, the app root component, and error boundaries also depend on Nuxt runtime
# context (useRoute, useHead, clearError, etc.) and are covered by E2E.
# Feature service/query/client files are excluded from vitest coverage (coverage.exclude
# in vitest.config.ts) because they are verified via integration + E2E; excluding them
# here too prevents Sonar from treating the missing lcov entries as 0% new-code coverage.
sonar.coverage.exclusions=app/pages/**,app/layouts/**,app/features/**,app/plugins/**,app/core/**,app/error.vue,e2e/**,app/utils/calculations/**,config/**,app/test-utils/**

# Pages and layouts are thin orchestration layers whose structural boilerplate
# (definePageMeta, useHead, etc.) is legitimately repeated. CPD exclusion mirrors
# the coverage exclusion rationale.
sonar.cpd.exclusions=app/pages/**,app/layouts/**

# Encoding
sonar.sourceEncoding=UTF-8

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.json

# ── Sonar issue suppressions ──────────────────────────────────────────────────
# S2068 (hardcoded credentials) — test fixtures are intentional mock values,
# not real secrets. Suppressed only for spec/test files.
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S2068
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.spec.ts
sonar.issue.ignore.multicriteria.e2.ruleKey=javascript:S2068
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.spec.ts
